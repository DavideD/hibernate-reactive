# A scheduler can only run on the default branch.
# With workflow_call, we can pass the branch we want to test as parameter so that we can check it out instead of the
# default branch
name: Scheduler for Hibernate Reactive CI build

on:
  schedule:
    - cron: '25 * * * *'

jobs:
  build-snapshots:
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: 'wip/2.4'
            ormBranch: 'wip/6.6'
          - branch: 'wip/3.2'
            ormBranch: 'wip/6.6'
          - branch: 'wip/3.3'
            ormBranch: 'wip/7.0'
          - branch: 'wip/3.4'
            ormBranch: 'wip/7.0'
          - branch: 'wip/4.2'
            ormBranch: 'wip/7.1'
          - branch: 'wip/4.3'
            ormBranch: 'wip/7.3'
          - branch: 'wip/4.4'
            ormBranch: 'main'
    uses: ./.github/workflows/build.yml
    with:
      branch: ${{ matrix.branch }}
      ormBranch: ${{ matrix.ormBranch }}
